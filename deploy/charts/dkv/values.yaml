replicaCount: 3

image:
  repository: dkv
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 50051

gossip:
  port: 7946

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 4Gi

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# EngineBuilder Configuration Options
engine:
  # TLS configurations for secure node-to-node connectivity
  tls:
    enabled: false
    certFile: ""
    keyFile: ""
  
  replicationFactor: 3
  singleNode: false

  # Write-ahead log configurations
  wal:
    path: "/data/wal"
    interval: "500ms"
    bufferSize: "65536" # 64KB
    segments: 16

  # Snapshotting configurations
  snapshot:
    path: "/data/snapshot.bin"
    interval: "5m"

  # Gossip communications configurations
  gossip:
    interval: "10s"

