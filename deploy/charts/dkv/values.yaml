replicaCount: 3

image:
  repository: dkv
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 50051

gossip:
  port: 7946

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 4Gi

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
