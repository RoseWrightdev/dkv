syntax = "proto3";

package dkv;

option go_package = "./";

service DkvService {
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc Set(SetRequest) returns (SetResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
}

message WalEntry {
  oneof entry {
    SetRequest set = 1;
    DeleteRequest delete = 2;
  }
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool exists = 2;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  int64 timestamp = 3;
}

message SetResponse {}

message DeleteRequest {
  string key = 1;
  int64 timestamp = 2;
}
message DeleteResponse {}
