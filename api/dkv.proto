syntax = "proto3";

package dkv;

option go_package = "./";
option java_multiple_files = true;
option java_package = "com.rosewrightdev.dkv.proto";

service DkvService {
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc Set(SetRequest) returns (SetResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  
  // Anti-Entropy Sync
  rpc Pull(PullRequest) returns (PullResponse) {}
  rpc Push(PushRequest) returns (PushResponse) {}
}

message PushRequest {
  repeated SetRequest entries = 1;
  repeated DeleteRequest deletions = 2;
}
message PushResponse {}

message PullRequest {
  fixed64 root_digest = 1;
  map<uint32, fixed64> shard_digests = 2;
  map<uint32, ShardDigests> sub_digests = 3;
  string node_id = 4;
}

message ShardDigests {
  repeated fixed64 sub_hashes = 1 [packed=true];
}

message PullResponse {
  repeated SetRequest entries = 1;
  repeated DeleteRequest deletions = 2;
}

message WalEntry {
  oneof entry {
    SetRequest set = 1;
    DeleteRequest delete = 2;
  }
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool exists = 2;
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  int64 timestamp = 3;
  string node_id = 4;
}

message SetResponse {}

message DeleteRequest {
  string key = 1;
  int64 timestamp = 2;
  string node_id = 3;
}

message DeleteResponse {}
