syntax = "proto3";

option go_package = "./";

service dkv {
    rpc Get (GetRequest) returns (GetResponse) {};
    rpc Set (SetRequest) returns (SetResponse) {};
    rpc Delete (DeleteRequest) returns (DeleteResponse) {};
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bytes value = 1;
    bool exists = 2;
}

message SetRequest {
    string key = 1;
    bytes value = 2;
}

message SetResponse {}

message DeleteRequest {
    string key = 1;
}
message DeleteResponse {
    bool existed = 1;
}
